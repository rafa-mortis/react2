name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
  push:
    branches: [ main, feature/*, feature/github-actions-enhancement ]

jobs:
  # Update Python dependencies
  update-python-deps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        
    - name: Install pip-tools
      run: pip install pip-tools
      
    - name: Update requirements.txt
      run: |
        cd backend
        pip-compile requirements.in --upgrade
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        cd backend
        python -c "import app; print('Backend imports successfully')" || true
        
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update Python dependencies'
        title: 'Update Python Dependencies'
        body: |
          Automated dependency update
          
          This PR updates Python dependencies to their latest versions.
          
          Please review the changes and ensure all tests pass.
        branch: chore/update-python-deps
        delete-branch: true

  # Update Node.js dependencies
  update-node-deps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Update dependencies
      run: |
        cd frontend
        npm update
        npm audit fix --audit-level=moderate || true
        
    - name: Run tests
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false || true
        
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update Node.js dependencies'
        title: 'Update Node.js Dependencies'
        body: |
          Automated dependency update
          
          This PR updates Node.js dependencies to their latest versions.
          
          Please review the changes and ensure all tests pass.
        branch: chore/update-node-deps
        delete-branch: true

  # Check for security vulnerabilities
  security-scan:
    runs-on: ubuntu-latest
    needs: [update-python-deps, update-node-deps]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high frontend/
        command: monitor
        
    - name: Run Snyk for Python
      uses: snyk/actions/python@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high backend/
        command: monitor
