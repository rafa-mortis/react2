name: CI Pipeline

on:
  push:
    branches: [ main, devops ]
  pull_request:
    branches: [ main ]

jobs:
  # Backend tests
  backend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        
    - name: Run security tests
      run: |
        cd backend
        python testes/test_security.py
        
    - name: Run database tests
      run: |
        cd backend
        python -m pytest testes/ -v || python testes/test_database.py

  # Frontend tests
  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Run unit tests
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false
        
    - name: Run integration tests
      run: |
        cd frontend
        npm test -- --testPathPattern=integration --watchAll=false

  # Docker build test
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build backend image
      run: |
        docker build -t react-login-backend:test ./backend
        
    - name: Build frontend image
      run: |
        docker build -t react-login-frontend:test ./frontend
        
    - name: Test docker-compose
      run: |
        docker-compose -f docker-compose.yml config

  # Security scan
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
