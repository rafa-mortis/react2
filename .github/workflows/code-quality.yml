name: Code Quality Checks

on:
  push:
    branches: [ main, feature/*, feature/github-actions-enhancement ]
  pull_request:
    branches: [ main ]

jobs:
  # Backend code quality
  backend-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install flake8 black isort pylint bandit
        
    - name: Run Black (code formatting)
      run: |
        cd backend
        black --check --diff .
        
    - name: Run isort (import sorting)
      run: |
        cd backend
        isort --check-only --diff .
        
    - name: Run flake8 (linting)
      run: |
        cd backend
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Run pylint (code analysis)
      run: |
        cd backend
        pylint app.py database.py || true  # Don't fail the build, just report

  # Frontend code quality
  frontend-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Run ESLint (if configured)
      run: |
        cd frontend
        npx eslint src/ --max-warnings=0 || true  # Don't fail if ESLint not configured
        
    - name: Check for unused dependencies
      run: |
        cd frontend
        npx depcheck || true
        
    - name: Audit npm packages
      run: |
        cd frontend
        npm audit --audit-level=moderate

  # Security checks
  security-checks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Bandit (Python security scanner)
      uses: securecodewarrior/github-action-bandit-scan@v1
      with:
        path: backend/
        
    - name: Run njsscan (Node.js security scanner)
      uses: securecodewarrior/github-action-njsscan@v1
      with:
        path: frontend/
        
    - name: Run semgrep (multi-language security)
      uses: returntocorp/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/secrets
          p/owasp-top-ten
