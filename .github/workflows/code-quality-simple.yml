name: Code Quality Checks

on:
  push:
    branches: [ main, feature/*, feature/github-actions-enhancement ]
  pull_request:
    branches: [ main ]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        
    - name: Install dependencies
      run: |
        pip install flake8 black isort pylint bandit
        
    - name: Run code quality checks
      run: |
        cd backend
        black --check --diff . || true
        isort --check-only --diff . || true
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true
        pylint app.py database.py || true
        bandit -r . || true

  frontend-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci || true
        
    - name: Run code quality checks
      run: |
        cd frontend
        npx eslint src/ --max-warnings=0 || true
        npx depcheck || true
        npm audit --audit-level=moderate || true
