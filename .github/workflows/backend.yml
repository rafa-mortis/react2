name: Backend CI Pipeline

on:
  push:
    branches: [ main, github-actions ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
        
    - name: 📁 Navigate to backend directory
      run: cd backend
      
    - name: 📦 Install dependencies
      working-directory: ./backend
      run: |
        echo "::group::Installing Python dependencies"
        pip install --upgrade pip
        pip install -r requirements.txt
        echo "::endgroup::"
        
    - name: 🔍 Run security audit
      working-directory: ./backend
      run: |
        echo "::group::Running security vulnerability scan"
        pip install "safety<3.0"
        safety check --json --output safety-report.json || true
        safety check --output screen || echo "Security scan completed with issues"
        echo "::endgroup::"
        
    - name: 🧪 Run database tests
      working-directory: ./backend
      run: |
        echo "::group::Running database tests"
        python -m pytest testes/test_database.py -v
        echo "::endgroup::"
        
    - name: 🔒 Run security tests
      working-directory: ./backend
      run: |
        echo "::group::Running security tests"
        python -m pytest testes/test_security.py -v
        echo "::endgroup::"
        
    - name: 🏗️ Run application tests
      working-directory: ./backend
      run: |
        echo "::group::Running application tests"
        echo "No additional pytest tests configured - skipping"
        echo "::endgroup::"
        
    - name: 📋 Test artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-test-results
        path: |
          backend/safety-report.json
          backend/testes/
        retention-days: 7
        
    - name: 🐳 Build Docker image (validation)
      run: |
        echo "::group::Building backend Docker image for validation"
        docker build -t react-backend:test ./backend
        echo "::endgroup::"
        
    - name: 🐳 Test Docker container
      run: |
        echo "::group::Testing backend Docker container"
        docker run -d --name backend-test -p 5001:5000 -e FLASK_ENV=testing react-backend:test
        sleep 30
        docker logs backend-test
        curl -f http://localhost:5001/health || exit 1
        docker stop backend-test
        docker rm backend-test
        echo "::endgroup::"
        
    - name: 🧹 Cleanup
      if: always()
      run: |
        echo "::group::Cleaning up Docker resources"
        docker rmi react-backend:test || true
        echo "::endgroup::"

  security-scan:
    runs-on: ubuntu-latest
    needs: backend-ci
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔍 Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'backend'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: 📊 Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
        
    - name: 📋 Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-scan-results
        path: trivy-results.sarif
        retention-days: 7

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        
    - name: 📦 Install linting tools
      working-directory: ./backend
      run: |
        echo "::group::Installing linting tools"
        pip install flake8 black isort
        echo "::endgroup::"
        
    - name: 🔍 Run code formatting check
      working-directory: ./backend
      run: |
        echo "::group::Checking code formatting with black"
        black --check --diff . || echo "Code formatting issues found but continuing..."
        echo "::endgroup::"
        
    - name: 🔍 Run import sorting check
      working-directory: ./backend
      run: |
        echo "::group::Checking import sorting with isort"
        isort --check-only --diff . || echo "Import sorting issues found but continuing..."
        echo "::endgroup::"
        
    - name: 🔍 Run linting
      working-directory: ./backend
      run: |
        echo "::group::Running linting with flake8"
        flake8 . --max-line-length=120 --extend-ignore=E203,W503,E501 || echo "Linting issues found but continuing..."
        echo "::endgroup::"
