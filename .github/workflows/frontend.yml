name: Frontend CI Pipeline

on:
  push:
    branches: [ main, github-actions ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🟢 Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: 📁 Navigate to frontend directory
      run: cd frontend
      
    - name: 📦 Install dependencies
      working-directory: ./frontend
      run: |
        echo "::group::Installing npm dependencies"
        npm ci --include=dev
        echo "::endgroup::"
        
    - name: 🔍 Run security audit
      working-directory: ./frontend
      run: |
        echo "::group::Running npm security audit"
        npm audit --audit-level=moderate
        echo "::endgroup::"
        
    - name: 🧪 Run unit tests
      working-directory: ./frontend
      run: |
        echo "::group::Running unit tests"
        npm test -- --watchAll=false --coverage src/unit.test.js
        echo "::endgroup::"
        
    - name: 🔗 Run integration tests
      working-directory: ./frontend
      run: |
        echo "::group::Running integration tests"
        npm test -- --watchAll=false src/integration.test.js
        echo "::endgroup::"
        
    - name: 🏗️ Build application
      working-directory: ./frontend
      run: |
        echo "::group::Building React application"
        npm run build
        echo "::endgroup::"
        
    - name: 📋 Build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-build
        path: frontend/build/
        retention-days: 7
        
    - name: 🐳 Build Docker image (validation)
      run: |
        echo "::group::Building frontend Docker image for validation"
        docker build -t react-frontend:test ./frontend
        echo "::endgroup::"
        
    - name: 🐳 Test Docker container
      run: |
        echo "::group::Testing frontend Docker container"
        docker run -d --name frontend-test -p 3001:3000 react-frontend:test
        sleep 30
        docker logs frontend-test
        curl -f http://localhost:3001 || exit 1
        docker stop frontend-test
        docker rm frontend-test
        echo "::endgroup::"
        
    - name: 🧹 Cleanup
      if: always()
      run: |
        echo "::group::Cleaning up Docker resources"
        docker rmi react-frontend:test || true
        echo "::endgroup::"

  playwright-tests:
    runs-on: ubuntu-latest
    needs: frontend-ci
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🟢 Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: 📦 Install dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: 🎭 Install Playwright browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps
      
    - name: 🌐 Run Playwright tests
      working-directory: ./frontend
      run: |
        echo "::group::Running end-to-end tests with Playwright"
        npx playwright test
        echo "::endgroup::"
        
    - name: 📊 Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 7
